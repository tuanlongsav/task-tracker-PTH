<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4a8"/>
      <stop offset="50%" style="stop-color:#38b2ac"/>
      <stop offset="100%" style="stop-color:#e8a838"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.7)"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.85)"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Glass overlay -->
  <rect x="20" y="20" width="472" height="240" rx="88" fill="rgba(255,255,255,0.08)"/>
  <!-- Horizontal lines (task list) -->
  <circle cx="128" cy="130" r="8" fill="#f5a623"/>
  <rect x="152" y="124" width="120" height="12" rx="6" fill="rgba(255,255,255,0.4)"/>
  <circle cx="128" cy="168" r="8" fill="#f5a623"/>
  <rect x="152" y="162" width="100" height="12" rx="6" fill="rgba(255,255,255,0.4)"/>
  <circle cx="128" cy="206" r="8" fill="#f5a623"/>
  <rect x="152" y="200" width="80" height="12" rx="6" fill="rgba(255,255,255,0.4)"/>
  <!-- Bar chart -->
  <rect x="300" y="180" width="36" height="70" rx="6" fill="url(#bar1)" opacity="0.6"/>
  <rect x="348" y="130" width="36" height="120" rx="6" fill="url(#bar1)" opacity="0.8"/>
  <rect x="300" y="155" width="36" height="95" rx="6" fill="url(#bar1)" opacity="0.0"/>
  <!-- Orange bar highlight -->
  <rect x="300" y="200" width="36" height="50" rx="6" fill="rgba(245,166,35,0.5)"/>
  <!-- Taller bar -->
  <rect x="348" y="140" width="36" height="110" rx="6" fill="url(#bar1)"/>
  <!-- Checkmark -->
  <path d="M290 280 L340 330 L410 220" stroke="url(#check)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Text -->
  <text x="256" y="400" text-anchor="middle" font-size="44" fill="white" font-family="Arial,Helvetica,sans-serif" font-weight="bold" letter-spacing="2">QUẢN LÝ TIẾN ĐỘ</text>
  <text x="256" y="452" text-anchor="middle" font-size="44" fill="white" font-family="Arial,Helvetica,sans-serif" font-weight="bold" letter-spacing="2">CÔNG VIỆC</text>
</svg>
